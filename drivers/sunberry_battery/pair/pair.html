<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style type="text/css">
        :root {
            color-scheme: light;
        }

        body {
            margin: 0;
        }

        .pair-shell {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .homey-form-group {
            margin-bottom: 0.875rem;
        }

        .homey-form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .homey-form-input {
            box-sizing: border-box;
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d7d7dc;
            border-radius: 6px;
            font-size: 1rem;
        }

        .homey-form-input:focus {
            outline: none;
            border-color: #0078d4;
            box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.18);
        }

        .homey-form-input.error {
            border-color: #c83b3b;
        }

        .hint {
            display: block;
            margin-top: 0.375rem;
            color: #666872;
            font-size: 0.8125rem;
            line-height: 1.35;
        }

        .check-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            min-height: 2.75rem;
            padding: 0.75rem 1rem;
            border: 0;
            border-radius: 6px;
            background: #0078d4;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
        }

        .check-button:hover:not(:disabled) {
            background: #006cbe;
        }

        .check-button:disabled {
            cursor: wait;
            opacity: 0.72;
        }

        .button-spinner {
            display: none;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.65);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .check-button.loading .button-spinner {
            display: inline-block;
        }

        .status-message {
            display: none;
            padding: 0.75rem;
            border: 1px solid #d7d7dc;
            border-radius: 6px;
            background: #f7f8fa;
            color: #22242a;
            font-size: 0.875rem;
            line-height: 1.4;
        }

        .status-message.visible {
            display: block;
        }

        .status-message strong {
            display: block;
            margin-bottom: 0.125rem;
            font-size: 0.9375rem;
        }

        .status-message.checking {
            border-color: #b8d8f0;
            background: #f1f7fc;
        }

        .status-message.success {
            border-color: #9fd3ad;
            background: #f1faf3;
        }

        .status-message.error {
            border-color: #e0a0a0;
            background: #fff5f5;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<header class="homey-header">
    <h1 class="homey-title">Connecting Sunberry</h1>
    <p class="homey-subtitle">Enter the IP address or hostname of your Sunberry device.</p>
</header>

<div class="homey-form pair-shell">
    <div class="homey-form-group">
        <label class="homey-form-label" for="ip_address">IP address</label>
        <input class="homey-form-input"
               type="text"
               id="ip_address"
               placeholder="sunberry.local"
               value="sunberry.local"
               autocomplete="off"
               autocapitalize="none"
               spellcheck="false"
               oninput="handleInput(event)" />
        <small class="hint">Default: sunberry.local. Use the actual IP address if mDNS is not available on your network.</small>
    </div>

    <button class="check-button" id="check-button" onclick="checkConnection()">
        <span class="button-spinner" aria-hidden="true"></span>
        <span id="check-button-label">Check connection</span>
    </button>

    <div id="status-message" class="status-message" role="status" aria-live="polite"></div>
</div>

<script type="application/javascript">
    const DEFAULT_HOST = 'sunberry.local';
    const INPUT_DEBOUNCE_TIME = 200;
    let inputTimer = null;
    let isChecking = false;

    document.addEventListener('DOMContentLoaded', initializePage);

    async function initializePage() {
        await Homey.setTitle('Connecting to Sunberry');
        await loadInitialSettings();
    }

    async function loadInitialSettings() {
        try {
            const settings = await Homey.emit('getSettings');
            const input = document.getElementById('ip_address');
            input.value = settings?.ip_address || DEFAULT_HOST;
            validateInput(input.value, { silent: true });
        } catch (error) {
            console.error('Failed to load pairing settings:', error);
            setStatus('error', 'Could not load settings', 'Try a different IP address or try again later.');
        }
    }

    function handleInput(event) {
        clearTimeout(inputTimer);
        inputTimer = setTimeout(() => validateInput(event.target.value), INPUT_DEBOUNCE_TIME);
    }

    function validateInput(value, options = {}) {
        const input = document.getElementById('ip_address');
        const trimmedValue = value.trim();

        if (!trimmedValue) {
            input.classList.add('error');
            if (!options.silent) {
                setStatus('error', 'IP address is required', 'Enter sunberry.local or the IP address of your Sunberry device.');
            }
            return false;
        }

        if (!isValidHost(trimmedValue)) {
            input.classList.add('error');
            if (!options.silent) {
                setStatus('error', 'Invalid address', 'Try a different IP address or try again later.');
            }
            return false;
        }

        input.classList.remove('error');
        if (!options.silent) clearStatus();
        return true;
    }

    function isValidHost(host) {
        const ipPattern = /^((25[0-5]|2[0-4][0-9]|[0-1]?[0-9]{1,2})\.){3}(25[0-5]|2[0-4][0-9]|[0-1]?[0-9]{1,2})$/;
        const hostnamePattern = /^[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$/;
        return host === DEFAULT_HOST || ipPattern.test(host) || (hostnamePattern.test(host) && host !== 'localhost');
    }

    async function checkConnection() {
        if (isChecking) return;

        const input = document.getElementById('ip_address');
        const host = input.value.trim() || DEFAULT_HOST;
        input.value = host;
        if (!validateInput(host)) return;

        setChecking(true);
        setStatus('checking', 'Checking connection', 'Looking for your Sunberry device...');

        try {
            const result = await Homey.emit('check', { ip_address: host });
            if (!result?.success || !result?.device) {
                throw new Error(result?.error || 'Connection failed');
            }

            setStatus('success', 'Device found', 'Adding it to Homey...');
            await new Promise(resolve => setTimeout(resolve, 250));
            await Homey.createDevice(result.device);
            await Homey.done();
        } catch (error) {
            console.error('Connection check failed:', error);
            setStatus('error', 'Connection failed', 'Try a different IP address or try again later.');
        } finally {
            setChecking(false);
        }
    }

    function setChecking(value) {
        isChecking = value;
        const button = document.getElementById('check-button');
        const label = document.getElementById('check-button-label');
        button.disabled = value;
        button.classList.toggle('loading', value);
        label.textContent = value ? 'Checking...' : 'Check connection';
    }

    function setStatus(type, title, detail) {
        const status = document.getElementById('status-message');
        status.className = `status-message visible ${type}`;
        status.innerHTML = `<strong>${escapeHtml(title)}</strong><span>${escapeHtml(detail)}</span>`;
    }

    function clearStatus() {
        const status = document.getElementById('status-message');
        status.className = 'status-message';
        status.textContent = '';
    }

    function escapeHtml(value) {
        return String(value).replace(/[&<>'"]/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
        }[char]));
    }
</script>
</body>
</html>
